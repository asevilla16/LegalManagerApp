<div class="card-body">
    <h4 class="card-title m-t-10">Drag & Drop Legal
        management
        Events</h4>
    <div class="row">
        <div class="col-md-12">
            <div id="calendar-events">
                <div class="calendar-events"
                    data-class="bg-info">
                    <i
                        class="fa fa-gavel text-info"></i>
                    Court Hearing
                </div>
                <div class="calendar-events"
                    data-class="bg-success">
                    <i
                        class="fa fa-balance-scale text-success"></i>
                    Client Meeting
                </div>
                <div class="calendar-events"
                    data-class="bg-danger">
                    <i
                        class="fa fa-file-contract text-danger"></i>
                    Document Filing
                </div>
                <div class="calendar-events"
                    data-class="bg-warning">
                    <i
                        class="fa fa-landmark text-warning"></i>
                    Case Review
                </div>
            </div>
            <!-- checkbox -->
            <div class="checkbox m-t-20">
                <input id="drop-remove" type="checkbox">
                <label for="drop-remove">
                    Remove after drop
                </label>
            </div>
            <a href="#" data-toggle="modal"
                data-target="#add-new-event"
                class="btn m-t-10 btn-info btn-block waves-effect waves-light">
                <i class="ti-plus"></i> Add New Event
            </a>
        </div>
    </div>
</div>
