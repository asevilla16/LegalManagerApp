<!-- Legal Case Calendar -->

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class>
                <div class="row">
                    <!-- Sidebar Events -->
                    <!-- <div class="col-lg-3">
                        <app-calendar-events-sidebar></app-calendar-events-sidebar>
                    </div> -->
                    <!-- Main Calendar -->
                    <!-- <div class="col-lg-9"> -->
                    <div class="col-lg-12">
                        <div class="card-body b-l calender-sidebar">
                            <!-- <div id="calendar"></div> -->
                            <full-calendar
                                [options]="calendarOptions"></full-calendar>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- BEGIN MODAL -->
<div class="modal none-border" id="my-event">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title"><strong>Add Legal Event</strong></h4>
                <button type="button" class="close" data-dismiss="modal"
                    aria-hidden="true">&times;</button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary waves-effect"
                    data-dismiss="modal">Close</button>
                <button type="button"
                    class="btn btn-success save-event waves-effect waves-light">Create
                    event</button>
                <button type="button"
                    class="btn btn-danger delete-event waves-effect waves-light"
                    data-dismiss="modal">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Add Category -->
<div class="modal fade none-border" id="add-new-event">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title"><strong>Add</strong> a Legal
                    Category</h4>
                <button type="button" class="close" data-dismiss="modal"
                    aria-hidden="true">&times;</button>
            </div>
            <div class="modal-body">
                <form role="form">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="control-label">Category Name</label>
                            <input class="form-control form-white"
                                placeholder="Enter category (e.g. Hearing, Meeting)"
                                type="text" name="category-name" />
                        </div>
                        <div class="col-md-6">
                            <label class="control-label">Choose Category
                                Color</label>
                            <select class="form-control form-white"
                                name="category-color">
                                <option value="success">Success</option>
                                <option value="danger">Danger</option>
                                <option value="info">Info</option>
                                <option value="primary">Primary</option>
                                <option value="warning">Warning</option>
                                <option value="inverse">Inverse</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button"
                    class="btn btn-danger waves-effect waves-light save-category"
                    data-dismiss="modal">Save</button>
                <button type="button" class="btn btn-secondary waves-effect"
                    data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
